  /api/v1/journal/entries/:
    get:
      operationId: v1_journal_entries_list
      description: CRUD for Journal Entries.
      parameters:
      - in: query
        name: is_favorite
        schema:
          type: boolean
      - in: query
        name: is_pinned
        schema:
          type: boolean
      - in: query
        name: mood
        schema:
          type: string
          enum:
          - amazing
          - angry
          - anxious
          - exhausted
          - good
          - neutral
          - sad
        description: |-
          * `amazing` - Amazing
          * `good` - Good
          * `neutral` - Neutral
          * `sad` - Sad
          * `anxious` - Anxious
          * `angry` - Angry
          * `exhausted` - Exhausted
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - archived
          - draft
          - published
        description: |-
