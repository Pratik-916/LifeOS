components:
  schemas:
    BlankEnum:
      enum:
      - ''
    ForgotPassword:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    FrequencyEnum:
      enum:
      - daily
      - weekly
      - monthly
      type: string
      description: |-
        * `daily` - Daily
        * `weekly` - Weekly
        * `monthly` - Monthly
    Goal:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        category:
          type: string
          maxLength: 50
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/GoalStatusEnum'
          readOnly: true
        target_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        progress:
          type: number
          format: double
        estimated_hours:
          type: number
          format: double
        actual_hours:
          type: number
          format: double
        color:
          type: string
          maxLength: 20
        icon:
          type: string
          maxLength: 50
        is_favorite:
          type: boolean
        is_archived:
          type: boolean
        tags:
          type: array
          items:
            type: string
            format: uuid
        tags_detail:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_updated_at:
          type: string
          format: date-time
          writeOnly: true
      required:
      - completed_at
      - created_at
      - deleted_at
      - id
      - status
      - tags_detail
      - title
      - updated_at
    GoalStatusEnum:
      enum:
      - not_started
      - in_progress
      - completed
      type: string
      description: |-
        * `not_started` - Not Started
        * `in_progress` - In Progress
        * `completed` - Completed
    Habit:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        category:
          type: string
          maxLength: 50
        icon:
          type: string
          maxLength: 50
        color:
          type: string
          maxLength: 20
        frequency:
          $ref: '#/components/schemas/FrequencyEnum'
        target_count:
          type: integer
          maximum: 2147483647
          minimum: 0
        current_count:
          type: integer
          readOnly: true
        current_streak:
          type: integer
          readOnly: true
        longest_streak:
          type: integer
          readOnly: true
        completion_rate:
          type: number
          format: double
          readOnly: true
        reminder_time:
          type: string
          format: time
          nullable: true
        reminder_enabled:
          type: boolean
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/HabitStatusEnum'
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        is_favorite:
          type: boolean
        is_archived:
          type: boolean
        tags:
          type: array
          items:
            type: string
            format: uuid
        tags_detail:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        logs:
          type: array
          items:
            $ref: '#/components/schemas/HabitLog'
          readOnly: true
        reminders:
          type: array
          items:
            $ref: '#/components/schemas/HabitReminder'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        deleted_at:
          type: string
